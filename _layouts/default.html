<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
    <link rel="stylesheet" href="{{ '/css/style.css' | relative_url }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    {{ content }}

    <script>
        window.siteData = {
            typewriterWords: {{ site.data.personal.typewriter_words | jsonify }},
            projects: {
                {% for project in site.data.projects.items %}"{{ project.id }}": {
                    "category": {{ project.category_label | jsonify }},
                    "title": {{ project.title | jsonify }},
                    "description": {{ project.summary | jsonify }},
                    "highlights": {{ project.highlights | jsonify }},
                    "tags": {{ project.full_tags | jsonify }},
                    "demo": {{ project.demo | jsonify }},
                    "github": {{ project.github | jsonify }}
                }{% unless forloop.last %},{% endunless %}
                {% endfor %}
            }
        };
    </script>
    <script src="{{ '/js/main.js' | relative_url }}"></script>
</body>
</html>
