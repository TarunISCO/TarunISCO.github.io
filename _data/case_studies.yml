- id: "genai-platform-casestudy"
  title: "Building an Enterprise GenAI Platform from Scratch"
  project_ref: "genai-platform"
  category: "GenAI"
  icon: "fas fa-network-wired"
  duration: "6+ months"
  role: "Lead Architect"
  problem: "A Fortune 500 healthcare company had 10+ disconnected GenAI experiments across departments — no shared tooling, duplicated costs, and inconsistent quality. They needed a centralized platform to unify these efforts."
  approach:
    - "Conducted stakeholder interviews across 5 business units to map requirements"
    - "Designed a modular architecture with MCP-server components for plug-and-play capability"
    - "Built shared RAG infrastructure with configurable pipelines per domain"
    - "Implemented agentic Text-to-SQL layer for structured data access"
    - "Created evaluation framework for consistent quality benchmarking"
  results:
    - "Unified 5+ business units onto a single platform"
    - "Reduced time-to-deploy for new GenAI use cases from months to weeks"
    - "Established shared knowledge base across Commercial IT division"
    - "Built reusable component library adopted by multiple teams"
  lessons:
    - "Start with the hardest use case — if the architecture handles it, everything else fits"
    - "MCP-server pattern enables true modularity for enterprise GenAI"
    - "Cross-domain data governance must be solved before scaling"
  architecture_image: ""

- id: "clv-casestudy"
  title: "€6M/Quarter Sales Pipeline Through Predictive Intelligence"
  project_ref: "clv-engine"
  category: "ML"
  icon: "fas fa-chart-line"
  duration: "12 months"
  role: "Data Scientist"
  problem: "A European medical equipment manufacturer relied on manual sales prospecting. Their 500+ person sales team had no data-driven way to identify which existing customers were ready for equipment upgrades, leading to missed upsell windows and revenue leakage."
  approach:
    - "Integrated data from CRM, ERP, service logs, usage telemetry, and contract systems"
    - "Built customer health scores combining equipment age, usage intensity, and service history"
    - "Developed propensity models predicting upgrade readiness at account level"
    - "Created automated alert system feeding scored leads into CRM workflows"
    - "Designed A/B testing framework to validate model-driven outreach vs. manual"
  results:
    - "Generated ~€6M/quarter in new qualified sales pipeline"
    - "Impacted €19M in open sales opportunities through data-driven reports"
    - "Reduced time from lead identification to outreach by 70%"
    - "Model adopted across 3 regional sales organizations"
  lessons:
    - "Data quality from legacy systems is the real bottleneck — budget 40% of time for it"
    - "Sales team adoption requires embedding outputs directly in their existing tools"
    - "Simple, explainable models outperform complex ones when humans need to trust the output"
  architecture_image: ""
