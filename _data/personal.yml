career_interests: "I'm looking for roles where I can architect and build AI-first products at scale — ideally as a <strong>GenAI/ML Lead</strong> or <strong>AI Solution Architect</strong> in fast-paced environments that value technical depth, strategic thinking, and hands-on engineering."

